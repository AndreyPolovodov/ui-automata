# yaml-language-server: $schema=https://raw.githubusercontent.com/visioncortex/ui-automata/main/workflow-schema.json
name: notepad_demo
description: |
  Notepad smoke test — exercises the ui-automata executor end-to-end.

  What it does:
    1. Launches Notepad
    2. Types "Hello World"
    3. Opens Format > Font dialog (via menu clicks)
    4. Reads the current font size, increments by 2, cycling back to 12 after 22
       using the formula: (size + 2) % 12 + 12
    5. Confirms with OK
    6. Saves the file to the default location (triggers Save As dialog)
    7. Confirms the filename and saves
    8. Types more text ("Goodbye")
    9. Closes the window — Notepad shows an unsaved-changes dialog
   10. Clicks "Don't Save"

# ── Parameters ────────────────────────────────────────────────────────────────
# Defaults here; override via CLI: ./workflow notepad.yml -- --text "hi" --save-as out.txt
params:
  - name: text
    description: Text to type into Notepad.
    default: "Hello World"
  - name: save_as
    description: Filename to use in the Save As dialog.
    default: "hello-world.txt"

defaults:
  timeout: 5s

# ── Launch App ────────────────────────────────────────────────────────────────
launch:
  exe: notepad.exe
  wait: new_pid

# ── Anchor library ────────────────────────────────────────────────────────────
# All anchors are declared here. Phases control when they are mounted/unmounted.
anchors:
  notepad:
    type: Root
    selector: "[name~=Notepad]"

  editor:
    type: Stable
    parent: notepad
    selector: ">> *"

  menubar:
    type: Stable
    parent: notepad
    selector: ">> [role='menu bar'][name=Application]"

  font_dialog:
    type: Ephemeral
    parent: notepad
    selector: ">> [role=dialog][name=Font]"

  saveas_dialog:
    type: Ephemeral
    parent: notepad
    selector: ">> [role=dialog][name='Save As']"

# ── Recovery handler library ──────────────────────────────────────────────────
# Named handlers referenced by phases via `recovery: handlers: [name, ...]`.
recovery_handlers:
  confirm_overwrite:
    trigger:
      type: ElementFound
      scope: notepad
      selector: ">> [role=dialog][name='Confirm Save As']"
    actions:
      - type: Invoke
        scope: notepad
        selector: ">> [role=dialog][name='Confirm Save As'] >> [role=button][name=Yes]"
    resume: retry_step

# ── Phases ────────────────────────────────────────────────────────────────────
phases:

  - name: type_text
    mount: [notepad, editor, menubar]  # mounted before steps run
    steps:
      - intent: type text into editor
        action:
          type: TypeText
          scope: editor
          selector: "*"
          text: "{param.text}"
        expect:
          type: ElementHasText
          scope: editor
          selector: "*"
          pattern:
            contains: "{param.text}"

  - name: open_font_dialog
    steps:
      - intent: click Format menu and wait for popup
        action:
          type: Click
          scope: menubar
          selector: "> [role='menu item'][name=Format]"
        expect:
          type: ElementFound
          scope: notepad
          selector: ">> [role='menu item'][name~=Font]"

      - intent: click Font menu item in popup
        action:
          type: Click
          scope: notepad
          selector: ">> [role='menu item'][name~=Font]"
        expect:
          type: DialogPresent
          scope: notepad

  - name: set_font_size
    mount: [font_dialog]
    unmount: [font_dialog]
    steps:
      - intent: read current font size
        action:
          type: Extract
          key: size
          scope: font_dialog
          selector: ">> [role='combo box'][name='Size:'] > [role=edit][name='Size:']"
          attribute: text
        expect:
          type: Always

      - intent: compute next font size
        action:
          type: Eval
          key: new_size
          expr: "(size + 2) % 12 + 12"
        expect:
          type: Always

      - intent: set font size to computed value
        action:
          type: SetValue
          scope: font_dialog
          selector: ">> [role='combo box'][name='Size:'] > [role=edit][name='Size:']"
          value: "{output.new_size}"
        expect:
          type: ElementHasText
          scope: font_dialog
          selector: ">> [role='combo box'][name='Size:'] > [role=edit][name='Size:']"
          pattern:
            exact: "{output.new_size}"

      - intent: click OK to confirm font
        action:
          type: Click
          scope: font_dialog
          selector: "> [role=button][name=OK]"
        expect:
          type: DialogAbsent
          scope: notepad

  - name: save_file
    mount: [saveas_dialog]
    unmount: [saveas_dialog]
    recovery:
      handlers: [confirm_overwrite]
    steps:
      - intent: click File menu and wait for popup
        action:
          type: Click
          scope: menubar
          selector: "> [role='menu item'][name=File]"
        expect:
          type: ElementFound
          scope: notepad
          selector: ">> [role='menu item'][name^=Save]"

      - intent: click Save in File menu
        action:
          type: Click
          scope: notepad
          selector: ">> [role='menu item'][name^=Save As]"
        expect:
          type: DialogPresent
          scope: notepad

      - intent: type filename in Save As dialog
        action:
          type: SetValue
          scope: saveas_dialog
          selector: ">> [role=combo box][name='File name:'] > [role=edit]"
          value: "{param.save_as}"
        expect:
          type: ElementHasText
          scope: saveas_dialog
          selector: ">> [role=combo box][name='File name:'] > [role=edit]"
          pattern:
            contains: "{param.save_as}"

      - intent: click Save button
        action:
          type: Invoke
          scope: saveas_dialog
          selector: ">> [role=button][name=Save]"
        expect:
          type: DialogAbsent
          scope: notepad

  - name: edit_more_text
    steps:
      - intent: append Goodbye
        action:
          type: TypeText
          scope: editor
          selector: "*"
          text: "\nGoodbye"
        expect:
          type: ElementHasText
          scope: editor
          selector: "*"
          pattern:
            contains: "Goodbye"

  - name: close_notepad
    steps:
      - intent: click title bar Close button
        action:
          type: CloseWindow
          scope: notepad
        expect:
          type: DialogPresent
          scope: notepad

      - intent: "click Don't Save"
        action:
          type: Click
          scope: notepad
          selector: ">> [role=button][name^=Don][name$=Save]"
        expect:
          type: WindowClosed
          anchor: notepad
