# yaml-language-server: $schema=https://raw.githubusercontent.com/visioncortex/ui-automata/main/workflow-schema.json
name: notepad_extract_text
description: |
  Verifies Extract with local:true and {output.x} substitution end-to-end.

  What it does:
    1. Launches Notepad
    2. Types "Hello" into the editor
    3. Extracts the editor's text value into output.typed (local)
    4. Types a newline + "{output.typed} again" — resolves to "\nHello again"
    5. Confirms the editor contains "Hello again"
    6. Closes without saving

defaults:
  timeout: 5s

launch:
  exe: notepad.exe
  wait: new_pid

anchors:
  notepad:
    type: Root
    selector: "[name~=Notepad]"

  editor:
    type: Stable
    parent: notepad
    selector: ">> [role=edit][name='Text Editor']"

phases:

  - name: type_initial_text
    mount: [notepad, editor]
    steps:
      - intent: type Hello into editor
        action:
          type: TypeText
          scope: editor
          selector: "[role=edit][name='Text Editor']"
          text: "Hello"
        expect:
          type: ElementHasText
          scope: editor
          selector: "[role=edit][name='Text Editor']"
          pattern:
            contains: "Hello"

  - name: extract_and_retype
    steps:
      - intent: extract current editor text into output.typed (local)
        action:
          type: Extract
          key: typed
          scope: editor
          selector: "[role=edit][name='Text Editor']"
          attribute: text
        expect:
          type: ElementFound
          scope: editor
          selector: "[role=edit][name='Text Editor']"

      - intent: append newline + extracted text + " again"
        action:
          type: TypeText
          scope: editor
          selector: "[role=edit][name='Text Editor']"
          text: "\n{output.typed} again"
        expect:
          type: ElementHasText
          scope: editor
          selector: "[role=edit][name='Text Editor']"
          pattern:
            contains: "Hello again"

  - name: close_notepad
    steps:
      - intent: click Close button
        action:
          type: Click
          scope: notepad
          selector: ">> [role='title bar'] > [role=button][name=Close]"
        expect:
          type: DialogPresent
          scope: notepad

      - intent: "click Don't Save"
        action:
          type: Click
          scope: notepad
          selector: ">> [role=button][name^=Don][name$=Save]"
        expect:
          type: WindowClosed
          anchor: notepad
